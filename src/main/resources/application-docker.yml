# Local app + vector stores in Docker (sec-edgar-filings-to-pgvector compose).
# Run: mvn spring-boot:run -Dspring-boot.run.profiles=docker
#
# Expects edgar-pgvector (ParadeDB + pgvector + pg_search BM25) on localhost:5433.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/edgar
    username: postgres
    password: postgres

app:
  pgsearch:
    enabled: true
    url: jdbc:postgresql://localhost:5433/edgar
    username: postgres
    password: postgres

  qdrantsearch:
    enabled: true
    url: http://localhost:6333
    collection: filing_chunks
    dense-vector: dense
    bm25-vector: content-bm25
    bm25-model: Qdrant/bm25

  search:
    top-k: 25
    hybrid-retrieval-top-k: 50
    rerank-top-n: 25

  vectorstores:
    default-vector-store: pgvector
    qdrant:
      url: http://localhost:6333
      collection: filing_chunks
