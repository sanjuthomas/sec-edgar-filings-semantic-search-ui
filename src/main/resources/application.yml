server:
  port: 8095

spring:
  application:
    name: sec-edgar-semantic-search

  # Spring Boot 3.4 + Ollama: avoid JDK HttpClient issues with long-running LLM calls
  http:
    client:
      factory: simple

  datasource:
    url: jdbc:postgresql://localhost:5433/edgar
    username: ${PGUSER:sanjuthomas}
    password: ${PGPASSWORD:}
    driver-class-name: org.postgresql.Driver

  thymeleaf:
    cache: false

  ai:
    model:
      chat: ollama
      embedding: ollama

    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:30b
          temperature: 0.2
          num-predict: 2048
      embedding:
        model: bge-m3

app:
  pgsearch:
    enabled: false

  search:
    top-k: 10
    embedding-dimensions: 1024
    hybrid-retrieval-top-k: 50
    rerank-top-n: 25

  vectorstores:
    default-vector-store: qdrant
    qdrant:
      url: http://localhost:16333
      collection: filing_chunks

logging:
  level:
    com.edgar.search: INFO
