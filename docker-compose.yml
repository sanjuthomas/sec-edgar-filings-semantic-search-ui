services:
  semantic-search-ui:
    image: sanjuthomas/sec-edgar-filings-semantic-search-ui:latest
    build: .
    ports:
      - "8095:8095"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5433/edgar
      SPRING_DATASOURCE_USERNAME: ${PGUSER:-sanjuthomas}
      SPRING_DATASOURCE_PASSWORD: ${PGPASSWORD:-}
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
